      <stop offset="0.34" stop-color="#bdf33b"/>
      <stop offset="0.72" stop-color="#5abc3b"/>
      <stop offset="1" stop-color="#267f34"/>
    </linearGradient>
    <linearGradient id="rightCapsule" x1="300" x2="431" y1="65" y2="108" gradientUnits="userSpaceOnUse">
