<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 190" role="img" aria-labelledby="title desc">
  <title id="title">Natural Korea logo</title>
  <desc id="desc">Complete Natural Korea capsule and leaf logo with wordmark.</desc>
  <defs>
    <radialGradient id="badgeGlow" cx="50%" cy="35%" r="72%">
