      <stop offset="0.58" stop-color="#123f22" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#0b2c18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftCapsule" x1="134" x2="265" y1="92" y2="64" gradientUnits="userSpaceOnUse">
